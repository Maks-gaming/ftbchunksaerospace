modLoader = "javafml"
loaderVersion = "${loader_version_range}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
logoFile = "mod_logo.png"
description = '''
Protects Sable assemblies and spawns inside FTB Chunks claims on NeoForge 1.21.1.
'''

[[dependencies.ftbchunksaerospace]]
modId = "neoforge"
type = "required"
versionRange = "[${neo_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbchunksaerospace]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies.ftbchunksaerospace]]
modId = "sable"
type = "required"
versionRange = "[1.1.3,)"
ordering = "AFTER"
side = "BOTH"

[[dependencies.ftbchunksaerospace]]
modId = "ftbchunks"
type = "required"
versionRange = "[${ftb_chunks_version},)"
ordering = "AFTER"
side = "BOTH"
